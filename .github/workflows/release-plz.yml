name: Release-plz

permissions:
  contents: write

on:
  push:
    branches:
      - main

# If multiple pushes to main happen quickly, queue them instead of running
# in parallel. cancel-in-progress is false so we never skip a release.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Publishes to crates.io and creates a GitHub Release when Cargo.toml
  # has a version newer than what's on crates.io (i.e., after a release PR
  # is merged).
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed so release-plz can find the last release
          # tag and generate accurate changelogs.
          fetch-depth: 0
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # 2.8.1
      - uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          # "release" compares Cargo.toml version to crates.io; if newer,
          # it runs `cargo publish` and creates a GitHub Release with the
          # changelog entry.
          command: release
        env:
          # GITHUB_TOKEN: used to create the GitHub Release and git tag.
          # CARGO_REGISTRY_TOKEN: used to authenticate `cargo publish`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

